name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
      WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY || secrets.VT_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Game Capture dependency
        uses: actions/checkout@v4
        with:
          repository: steveseguin/game-capture
          path: game-capture

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.6"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install nsis 7zip.install -y --no-progress

      - name: Derive release version
        id: version
        shell: pwsh
        run: |
          $manualVersion = "${{ github.event.inputs.version }}"
          if (-not [string]::IsNullOrWhiteSpace($manualVersion)) {
            $version = $manualVersion.Trim()
          } else {
            $refName = "${{ github.ref_name }}"
            if ([string]::IsNullOrWhiteSpace($refName)) {
              throw "github.ref_name is empty"
            }
            $version = $refName.TrimStart('v')
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run native fast gate
        shell: pwsh
        run: |
          .\audio-router\native-qt\qa\run-fast-gate.ps1 -BuildDir build-release -Configuration Release

      - name: Run native stability gate
        shell: pwsh
        run: |
          .\audio-router\native-qt\qa\run-stability-gate.ps1 -BuildDir build-release -Configuration Release -Iterations 3

      - name: Build signed release artifacts
        shell: pwsh
        run: |
          .\audio-router\native-qt\qa\build-release.ps1 -BuildDir build-release -Configuration Release -Version "${{ steps.version.outputs.value }}"

      - name: Upload release bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: audio-router/native-qt/dist/*
          if-no-files-found: warn

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          target_commitish: main
          name: VDO Cable v${{ steps.version.outputs.value }}
          files: |
            audio-router/native-qt/dist/vdocable-${{ steps.version.outputs.value }}-setup.exe
            audio-router/native-qt/dist/vdocable-${{ steps.version.outputs.value }}-portable.exe
            audio-router/native-qt/dist/vdocable-${{ steps.version.outputs.value }}-win64.zip
            audio-router/native-qt/dist/vdocable-setup.exe
            audio-router/native-qt/dist/vdocable-portable.exe
            audio-router/native-qt/dist/vdocable-win64.zip
          generate_release_notes: true
          append_body: true
          body: |
            Stable latest-download aliases:
            - `vdocable-setup.exe`
            - `vdocable-portable.exe`
            - `vdocable-win64.zip`

            Release automation includes:
            - native fast gate
            - Authenticode signing
            - VirusTotal submission
            - GitHub Pages-compatible fixed asset names
